version: '3.8'

services:
  backend:
    build: ./backend
    container_name: rechnungsvorfilterung-backend
    ports:
      - "3001:3001"
    volumes:
      - ./data:/app/data
      - ./uploads:/app/uploads
    environment:
      - NODE_ENV=production
      - DATABASE_PATH=/app/data/database.sqlite
      - UPLOADS_PATH=/app/uploads
      - OLLAMA_HOST=http://ollama:11434
    depends_on:
      - ollama
    restart: unless-stopped
    networks:
      - rechnungen-net

  frontend:
    build: ./frontend
    container_name: rechnungsvorfilterung-frontend
    ports:
      - "3000:80"
    depends_on:
      - backend
    restart: unless-stopped
    networks:
      - rechnungen-net

  ollama:
    image: ollama/ollama:latest
    container_name: rechnungsvorfilterung-ollama
    ports:
      - "11434:11434"
    volumes:
      - ollama-data:/root/.ollama
    restart: unless-stopped
    networks:
      - rechnungen-net
    deploy:
      resources:
        reservations:
          devices:
            - driver: nvidia
              count: all
              capabilities: [gpu]

volumes:
  ollama-data:

networks:
  rechnungen-net:
    driver: bridge
